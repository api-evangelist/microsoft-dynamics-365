          description: >-
            Bind reference to a customer account. Format:
            /accounts(GUID).
        customerid_contact@odata.bind:
          type: string
          description: >-
            Bind reference to a customer contact. Format:
            /contacts(GUID).
        parentaccountid@odata.bind:
          type: string
          description: >-
            Bind reference to a parent account. Format:
            /accounts(GUID).
        parentcontactid@odata.bind:
          type: string
          description: >-
            Bind reference to a parent contact. Format:
            /contacts(GUID).
        originatingleadid@odata.bind:
          type: string
          description: >-
            Bind reference to the originating lead. Format:
            /leads(GUID).
        campaignid@odata.bind:
          type: string
          description: >-
            Bind reference to the source campaign. Format:
            /campaigns(GUID).
        transactioncurrencyid@odata.bind:
          type: string
          description: >-
            Bind reference to a currency record. Format:
            /transactioncurrencies(GUID).
    ODataError:
      type: object
      description: OData error response from the Dataverse Web API.
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Error code.
            message:
              type: string
              description: Human-readable error message.
            innererror:
              type: object
              properties:
                message:
                  type: string
                  description: Detailed error message.
                type:
                  type: string
                  description: Exception type.
                stacktrace:
                  type: string
                  description: Stack trace (available in non-production environments).
  responses:
    Unauthorized:
      description: Authentication credentials are missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ODataError'
    Forbidden:
      description: The authenticated user does not have permission to perform this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ODataError'
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ODataError'
    PreconditionFailed:
      description: >-
        The ETag value provided in the If-Match header does not match the
        current version of the record.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ODataError'
