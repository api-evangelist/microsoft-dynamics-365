  - Microsoft
description: Microsoft Dynamics 365 is the cloud business-applications portfolio — Sales,
  Customer Service, Field Service, Finance, Supply Chain Management, Commerce, Project
  Operations, Business Central, Customer Insights (Data + Journeys), and Human Resources.
  All apps are licensed per-user-per-month with annual commitment, except tenant-priced
  platforms (Customer Insights). The qualifying-offer attach model lets users pay full price
  on the first app and a reduced 'attach' rate on subsequent apps. Copilot for Sales / for
  Service is included in the higher-tier SKUs at no extra cost. Storage is split into
  Dataverse capacity (database GB, file GB, log GB) sold per tenant.
sources:
  - https://www.microsoft.com/dynamics-365/pricing
  - https://learn.microsoft.com/en-us/dynamics365/get-started/licensing-overview
  - https://learn.microsoft.com/en-us/power-platform/admin/capacity-storage
