description: Machine-readable plans and pricing scaffold for this API provider. Conforms to the API Commons
  Plans schema. Tier limits and prices are scaffold defaults; replace with provider-published values.
plans:
  - id: microsoft-dynamics-365-free
    name: Free
    type: freemium
    description: Free entry tier for the Microsoft Dynamics 365 API surface. Intended for evaluation,
      prototyping, and low-volume integrations. Real limits and pricing must be reconciled with the provider's
      published plan documentation.
    entries:
      - label: API Requests
        description: Monthly API request quota across all included endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: month
        geo: global
        domains:
          - https://[org].api.crm.dynamics.com/api/data/v9.2
          - https://[org].operations.dynamics.com/data
          - https://api.businesscentral.dynamics.com/v2.0/[tenant]/[environment]/api/v2.0
          - https://[org].commerce.dynamics.com/api
          - https://api.ci.ai.dynamics.com/
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the free tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 10
        timeFrame: minute
        geo: global
        domains:
          - https://[org].api.crm.dynamics.com/api/data/v9.2
          - https://[org].operations.dynamics.com/data
          - https://api.businesscentral.dynamics.com/v2.0/[tenant]/[environment]/api/v2.0
          - https://[org].commerce.dynamics.com/api
          - https://api.ci.ai.dynamics.com/
        unit: 1
        price: '0.00'
        userMultiplied: false
