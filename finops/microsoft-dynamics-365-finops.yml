billingModel:
  pricingCategory: Subscription (per Seat) + Tenant + Usage (storage/API)
  billingFrequency: Monthly (annual commitment for most apps)
  billingCurrency: USD (settlement varies)
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Credit
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Microsoft Dynamics 365
  ServiceCategory: Business Applications
  ProviderName: Microsoft Corporation
  PublisherName: Microsoft Corporation
  InvoiceIssuerName: Microsoft Corporation
  PricingCategory: Subscription
  PricingUnit: user-month
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: app_seats
    description: Per-app user seats — Sales, Customer Service, Field Service, Finance, SCM,
      Commerce, HR, Project Operations.
    unit: user-month
    aggregation: max
    dimensions:
      - app
      - sku
      - is_attach
      - department
  - name: business_central_seats
    description: Business Central Essentials / Premium / Team Members.
    unit: user-month
    aggregation: max
    dimensions:
      - sku
  - name: customer_insights_tenants
    description: Customer Insights Data + Journeys tenant subscriptions.
    unit: tenant-month
    aggregation: max
    dimensions:
      - product
      - profile_band
  - name: dataverse_db_capacity
    description: Dataverse database capacity (GB-month).
    unit: GB-month
    aggregation: max
    dimensions:
      - environment
      - tenant
  - name: dataverse_file_capacity
    description: Dataverse file / blob capacity.
    unit: GB-month
    aggregation: max
    dimensions:
      - environment
  - name: dataverse_log_capacity
    description: Dataverse audit log capacity.
    unit: GB-month
    aggregation: max
    dimensions:
      - environment
  - name: api_request_entitlement_consumed
    description: Daily Dataverse API requests beyond licensed allocation, billed via Power
      Platform request capacity packs.
    unit: 1000-requests
    aggregation: sum
    dimensions:
      - environment
      - service_principal
  - name: contact_center_ivr_minutes
    description: Inbound voice-channel minutes for Dynamics 365 Contact Center.
    unit: minute
    aggregation: sum
    dimensions:
      - channel
      - country
principles:
  - name: Visibility
    description: Microsoft 365 admin center > Billing surfaces seat allocations and the
      qualifying-offer attach status. Power Platform admin center > Resources > Capacity shows
      Dataverse storage and API entitlement consumption per environment. Dynamics 365 admin
      center surfaces production / sandbox split. FOCUS-aligned commerce exports itemize each
      Dynamics SKU.
  - name: Allocation
    description: Use Entra ID dynamic groups by department / cost-center to assign the right
      SKU per role. Multi-environment deployments split seats by business unit. Tag Dataverse
      environments with cost-center and feed the tag into Power Platform admin center reports.
  - name: Optimization
    description: Use qualifying-offer attach for users needing multiple apps (e.g., Sales
      Enterprise primary + Customer Service attach at $20). Replace full Sales/CS users with
      Team Members ($8) where read-only access suffices. Buy Customer Insights at the actual
      profile band; right-size profile capacity quarterly. Prefer Business Central over full
      Finance/SCM for SMB. Disable trial environments developers spin up. Archive old
      Dataverse audit logs to reduce log capacity. For Contact Center, route low-value inbound
      traffic to digital channels to reduce per-minute IVR cost.
  - name: Accountability
    description: License administrator approves new seat purchases; FinOps validates
      attach-eligibility before each purchase. Quarterly audit of last-sign-in date triggers
      seat reclamation. Set Cost Management budget on the M365/Dynamics commerce subscription
      with alerts at 80/100%. Monthly Dataverse capacity review with a target of <80%
      tenant-cap utilization.
