description: FOCUS-aligned FinOps for Microsoft Dynamics 365 — primarily per-user-per-month
  seat pricing across Sales, Customer Service, Field Service, Project Operations, Finance,
  Supply Chain, Commerce, HR, plus tenant-priced Customer Insights and metered Dataverse
  capacity. Largest savings come from the qualifying-offer attach pricing (subsequent apps
  per user at $20–$30 vs full price), right-sizing Customer Insights profile capacity, and
  using Team Members for read-mostly users.
